site_name: Lakehouse com Databricks & Arquitetura Medalhão
site_description: Pipeline de dados completo com Databricks Free Edition, Delta Lake e Arquitetura Medalhão
site_author: Seu Nome
repo_url: https://github.com/seu-usuario/spark-delta-databricks-study
repo_name: spark-delta-databricks-study

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

plugins:
  - search

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Notebooks: notebooks.md
  - Como Executar: como-executar.md
